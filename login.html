    <script type="module">import { injectIntoGlobalHook } from "/@react-refresh";
injectIntoGlobalHook(window);
window.$RefreshReg$ = () => {};
window.$RefreshSig$ = () => (type) => type;</script>

    <script type="module" src="/@vite/client"></script>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>nera | Vitrine & Agendamento Premium</title>
    <script>
      // 1. Aggressive ServiceWorker Wipe (Force refresh for everyone)
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) {
            registration.unregister().then(() => {
              console.log('[DEBUG] SW Unregistered');
              // Optional: location.reload() might be too aggressive if not handled carefully
            });
          }
        });
        
        // Also try to skip waiting and take control if a new one is trying to install
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          console.log('[DEBUG] SW Controller changed');
        });
      }

      // 2. Global Diagnostic Logging
      window.onerror = function(msg, url, line, col, error) {
        const errorText = `[JS_ERROR] ${msg} | ${url}:${line}:${col}`;
        console.error(errorText, error);
      };
    </script>
  </head>
