<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>nera | Vitrine & Agendamento Premium</title>
    <script>
      // 1. Aggressive ServiceWorker Wipe (Force refresh for everyone)
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) {
            registration.unregister().then(() => {
              console.log('[DEBUG] SW Unregistered');
              // Optional: location.reload() might be too aggressive if not handled carefully
            });
          }
        });
        
        // Also try to skip waiting and take control if a new one is trying to install
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          console.log('[DEBUG] SW Controller changed');
        });
      }

      // 2. Global Diagnostic UI (Only visible if something crashes)
      window.onerror = function(msg, url, line, col, error) {
        const errorText = `[JS_ERROR] ${msg} | ${url}:${line}:${col}`;
        console.error(errorText, error);
        
        const overlay = document.createElement('div');
        overlay.id = 'debug-error-overlay';
        overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,0,0,0.9);color:white;padding:40px;z-index:999999;font-family:monospace;overflow:auto;';
        overlay.innerHTML = `
          <h1 style="font-size:24px;border-bottom:1px solid white;padding-bottom:10px">ERRO DE RUNTIME - USENERA</h1>
          <p style="background:rgba(0,0,0,0.5);padding:10px;margin:20px 0">${msg}</p>
          <div style="font-size:12px">
            <strong>URL:</strong> ${url}<br>
            <strong>Linha:</strong> ${line} | <strong>Col:</strong> ${col}<br><br>
            <strong>Stack:</strong><br>
            <pre style="white-space:pre-wrap">${error ? error.stack : 'N/A'}</pre>
            <hr>
            <strong>Host:</strong> ${window.location.hostname}<br>
            <strong>UserAgent:</strong> ${navigator.userAgent}
          </div>
          <button onclick="localStorage.clear(); sessionStorage.clear(); location.reload(true);" style="margin-top:20px;padding:10px 20px;background:white;color:red;border:none;border-radius:4px;cursor:pointer;font-weight:bold">LIMPAR TUDO E RECARREGAR (FORCE)</button>
        `;
        document.body ? document.body.appendChild(overlay) : document.documentElement.appendChild(overlay);
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
