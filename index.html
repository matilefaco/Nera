<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>nera — agenda e presença para profissionais de beleza</title>
    <meta name="description" content="Agendamentos, vitrine profissional e presença digital para profissionais de beleza que levam o próprio trabalho a sério." />
    
    <!-- Fonts Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Outfit:wght@200;300;400;500&family=Great+Vibes&display=swap" rel="stylesheet" />

    <script>
      // 1. Aggressive ServiceWorker Wipe (Force refresh for everyone)
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) {
            registration.unregister();
          }
        });
      }

      // 2. Global Diagnostic Logging
      window.onerror = function(msg, url, line, col, error) {
        // Only log to console if not in production or if it's a critical error
        var isDev = window.location.hostname === 'localhost' || window.location.hostname.includes('ais-');
        if (isDev) {
          const errorText = `[JS_ERROR] ${msg} | ${url}:${line}:${col}`;
          console.error(errorText, error);
        }
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
